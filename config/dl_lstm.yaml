exchange:
  name: "okx"
  symbol: "BTC/USDT:USDT"
  sandbox: false
  leverage: 5

engine:
  reverse_signal_policy: "ignore"

risk:
  max_daily_loss_pct: 0.05
  max_drawdown_pct: 0.35
  max_position_size_btc: 1.0
  max_concurrent_positions: 1

accounting:
  taker_fee_pct: 0.0005
  slippage_pct: 0.0
  funding_enabled: true

paper:
  initial_balance: 10000.0

data:
  history_bars: 300
  candle_dir: "data/candles"

database:
  path: "data/coinbot.db"

logging:
  level: "INFO"
  file: "logs/coinbot.log"
  max_size_mb: 50
  backup_count: 5

strategies:
  active: ["dl_lstm"]

dl_lstm:
  # ── 엔진 필수 ──
  risk_per_trade_pct: 0.01
  max_leverage: 5

  # ── 모델 ──
  model_path: "models/lstm/latest"
  confidence_threshold: 0.55
  calibration_method: "isotonic"  # "none" / "platt" / "isotonic" (Phase E-2-3 Step 2 — I-B009; BP-3-1 default isotonic)

  # ── 타임프레임 ──
  entry_timeframe: "15m"
  required_timeframes: ["15m", "1h", "4h"]

  # ── 시퀀스 ──
  lookback: 60                       # 15m봉 60개 = 15시간 컨텍스트

  # ── SL/TP ──
  atr_period: 14
  atr_sl_mult: 2.0
  reward_risk_ratio: 2.0

  # ── 학습 전용 (train_lstm.py가 참조, 추론 시 무시) ──
  train:
    label_method: "direction"   # "direction" | "triple_barrier" (BP-3-3)
    horizon: 10                 # direction 전용
    threshold_pct: 0.3          # direction 전용
    triple_barrier:             # triple_barrier 전용 (사안 U 가)
      upper_pct: 1.0
      lower_pct: 1.0
      time_barrier_bars: 10
    train_months: 6
    test_months: 2
    step_months: 2
    learning_rate: 0.001
    batch_size: 256
    epochs: 50
    early_stopping_patience: 5
    lstm_params:
      hidden_size: 64
      num_layers: 1
      dropout: 0.3
