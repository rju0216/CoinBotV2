# CoinBot 뼈대 프로토타입 기본 config.
# subcommand(paper/live/backtest)로 실행 모드 결정 (§7). mode 필드 없음.
# OKX API 자격증명은 .env의 OKX_API_KEY / OKX_SECRET / OKX_PASSPHRASE로 주입.

exchange:
  name: "okx"
  symbol: "BTC/USDT:USDT"
  sandbox: false
  leverage: 5                         # 거래소 단일 레버리지 설정 (전략별 max_leverage와 구분)

engine:
  reverse_signal_policy: "ignore"    # "ignore" | "reverse" | "same_strategy_only"

risk:                                # 엔진 전역 안전장치
  max_daily_loss_pct: 0.05
  max_drawdown_pct: 0.35
  max_position_size_btc: 1.0
  max_concurrent_positions: 1        # (C) 배타적 경합 — 전역 슬롯 1개
  volatility_targeting:              # BP-2-2: 동적 사이징 (사안 J 가, K 가, L 가)
    enabled: false                   # default 비활성 — 활성화 시 ATR 기반 size 축소만 적용
    target_atr_pct: 0.005            # 평소 변동성 기준 (entry_timeframe ATR_pct)
    lookback: 14                     # ATR 산출 기간
  circuit_breaker:                   # BL-2-1: API 연속 실패 자동 차단 (사안 G 나)
    enabled: true                    # default 활성 (라이브 안전망)
    failure_threshold: 5             # 연속 실패 5회 → CircuitBreakerOpen + 새 진입 차단
    auto_resume: false               # 사용자 manual 해제 (CoreEngine 재시작 또는 broker.executor.circuit_breaker.reset())

accounting:
  taker_fee_pct: 0.0005
  slippage_pct: 0.0
  funding_enabled: true              # 라이브는 fetch_funding_history, 백테는 0

paper:
  initial_balance: 10000.0

live:
  oos_monitoring:                    # BP-2-3: 라이브 OOS 모니터링 (사안 D 나: 알림만)
    enabled: false                   # default 비활성
    window: 100                      # 최근 N개 신호의 적중률 계산
    horizon: 10                      # 평가 horizon (entry_timeframe 봉 단위)
    threshold_pct: 0.003             # actual label 분류 임계 (0.3%)
    min_acc_threshold: 0.50          # 적중률 < 이 값이면 알림
    cooldown_bars: 10                # 알림 후 재알림까지 최소 봉 수
    alert_method: "log"              # 현재 "log"만 지원. 미래: "telegram" / "email"
    warmup_decay_threshold_pct: 0.10 # BL-2 추가: 학습 OOS Acc - warmup 적중률 ≥ 이 값이면 alpha decay 알림

  orderbook:                         # BL-2-2: 호가창 수집 인프라 (paper 모드용)
    enabled: false                   # default 비활성 (paper 시연 시 활성)
    depth: 20                        # 호가 단계 수 (사안 Z'' 나)
    save_dir: "data/orderbook"       # parquet 저장 디렉토리

  notifications:                     # BL-2-1: 알림 인프라 (사안 T'' 가, V'' default+POSITION on)
    enabled: true                    # default 활성 (LogNotifier만)
    channels: ["log"]                # 사용자가 텔레그램 추가 시 ["log", "telegram"]
    telegram:
      bot_token: ""                  # @BotFather에서 발급 후 입력
      chat_id: ""                    # 본인 chat_id 입력
    email:                           # 옵션 (사용자 SMTP 설정 시)
      smtp_host: ""
      smtp_port: 587
      username: ""
      password: ""
      from_addr: ""
      to_addr: ""
    levels:                          # 각 이벤트의 송신 활성/비활성 (사안 V'')
      drawdown_lock: true
      daily_loss_lock: true
      circuit_breaker: true
      oos_decay: true
      position_open: true            # V'' default on 결정
      position_close: true           # V'' default on 결정

data:
  history_bars: 300
  candle_dir: "data/candles"

database:
  path: "data/coinbot.db"             # mode별 접미사 자동 부여 (coinbot_live.db, coinbot_paper.db, coinbot_backtest.db)

logging:
  level: "INFO"
  file: "logs/coinbot.log"
  max_size_mb: 50
  backup_count: 5

strategies:
  active: []                          # 뼈대 상태 — 사용자가 전략 이름을 추가해야 매매 발생.
                                      # 예: ["example_macross"] 로 켜면 아래 샘플 전략이 활성화됨.
                                      # (C) 정책: 리스트 순서 = 우선순위.

# ---- 샘플 전략 섹션 (참고용) ----
# strategy/plugins/example.py 의 ExampleMACross 가 등록되어 있다.
# active 리스트에 "example_macross" 를 추가해야 실제로 동작한다.
example_macross:
  risk_per_trade_pct: 0.01            # 필수 (엔진 사이징)
  max_leverage: 5                     # 필수 (엔진 사이징)
  ma_fast: 20
  ma_slow: 50
  atr_period: 14
  atr_sl_mult: 1.5
  reward_risk_ratio: 2.0
