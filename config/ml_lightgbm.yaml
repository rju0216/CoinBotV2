exchange:
  name: "okx"
  symbol: "BTC/USDT:USDT"
  sandbox: false
  leverage: 5

engine:
  reverse_signal_policy: "ignore"

risk:
  max_daily_loss_pct: 0.05
  max_drawdown_pct: 0.35
  max_position_size_btc: 1.0
  max_concurrent_positions: 1
  volatility_targeting:              # BP-2-2: 동적 사이징 (사안 J 가, K 가, L 가)
    enabled: false
    target_atr_pct: 0.005
    lookback: 14
  circuit_breaker:                   # BL-2-1: API 연속 실패 자동 차단 (사안 G 나)
    enabled: true
    failure_threshold: 5
    auto_resume: false

accounting:
  taker_fee_pct: 0.0005
  slippage_pct: 0.0
  funding_enabled: true

paper:
  initial_balance: 10000.0

live:
  oos_monitoring:                    # BP-2-3: 라이브 OOS 모니터링 (사안 D 나) + BL-2 warm-up
    enabled: false
    window: 100
    horizon: 10
    threshold_pct: 0.003
    min_acc_threshold: 0.50
    cooldown_bars: 10
    alert_method: "log"
    warmup_decay_threshold_pct: 0.10
  orderbook:                         # BL-2-2: 호가창 (paper 모드용)
    enabled: false
    depth: 20
    save_dir: "data/orderbook"
  notifications:                     # BL-2-1: 알림 인프라
    enabled: true
    channels: ["log"]                # 텔레그램 활성 시 ["log", "telegram"] (.env에 TOKEN/CHAT_ID)
    telegram:
      bot_token: ""
      chat_id: ""
    email:
      smtp_host: ""
      smtp_port: 587
      username: ""
      password: ""
      from_addr: ""
      to_addr: ""
    levels:
      drawdown_lock: true
      daily_loss_lock: true
      circuit_breaker: true
      oos_decay: true
      position_open: true
      position_close: true

data:
  history_bars: 300
  candle_dir: "data/candles"

database:
  path: "data/coinbot.db"

logging:
  level: "INFO"
  file: "logs/coinbot.log"
  max_size_mb: 50
  backup_count: 5

strategies:
  active: ["ml_lightgbm"]

ml_lightgbm:
  # ── 엔진 필수 ──
  risk_per_trade_pct: 0.01
  max_leverage: 5

  # ── 모델 ──
  model_path: "models/lightgbm/latest"
  confidence_threshold: 0.55
  calibration_method: "isotonic"  # "none" / "platt" / "isotonic" (Phase E-2-3 Step 2 — I-B009; BP-3-1 default isotonic)

  # ── 타임프레임 ──
  entry_timeframe: "15m"
  required_timeframes: ["15m", "1h", "4h"]

  # ── SL/TP ──
  atr_period: 14
  atr_sl_mult: 2.0
  reward_risk_ratio: 2.0

  # ── 학습 전용 (train_lightgbm.py가 참조, 추론 시 무시) ──
  train:
    label_method: "triple_barrier"   # "direction" | "triple_barrier" (BP-3-3)
    horizon: 10                 # direction 전용
    threshold_pct: 0.3          # direction 전용
    triple_barrier:             # triple_barrier 전용 (사안 U 가)
      upper_pct: 1.0
      lower_pct: 1.0
      time_barrier_bars: 10
    train_months: 6
    test_months: 2
    step_months: 2
    n_estimators: 500
    early_stopping_rounds: 50
    lgb_params:
      learning_rate: 0.05
      num_leaves: 63
      max_depth: 7
